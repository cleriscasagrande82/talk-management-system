version: '3.8'

services:
  app:
    image: myapp:latest
    build:
      context: .
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    environment:
      - ENV_VAR=value

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
